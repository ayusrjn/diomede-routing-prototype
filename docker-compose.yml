version: "3.8"

services:
  orthanc-node1:
    image: orthancteam/orthanc:latest
    container_name: orthanc-node1
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      ORTHANC__NAME: "Node1"
      ORTHANC__DICOM_AET: "NODE1"
      ORTHANC__DICOM_PORT: "4242"
      ORTHANC__HTTP_PORT: "8042"
      ORTHANC__AUTHENTICATION_ENABLED: "false"

  orthanc-node2:
    image: orthancteam/orthanc:latest
    container_name: orthanc-node2
    ports:
      - "8043:8042"
      - "4243:4242"
    environment:
      ORTHANC__NAME: "Node2"
      ORTHANC__DICOM_AET: "NODE2"
      ORTHANC__DICOM_PORT: "4242"
      ORTHANC__HTTP_PORT: "8042"
      ORTHANC__AUTHENTICATION_ENABLED: "false"

  orthanc-node3:
    image: orthancteam/orthanc:latest
    container_name: orthanc-node3
    ports:
      - "8044:8042"
      - "4244:4242"
    environment:
      ORTHANC__NAME: "Node3"
      ORTHANC__DICOM_AET: "NODE3"
      ORTHANC__DICOM_PORT: "4242"
      ORTHANC__HTTP_PORT: "8042"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
